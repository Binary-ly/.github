<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="Binary — Software Studio">
  <rect width="1280" height="640" fill="#080808"/>

  <!-- subtle gold glow -->
  <circle cx="1180" cy="80" r="320" fill="#C9A84C" opacity="0.06"/>
  <circle cx="80" cy="600" r="240" fill="#C9A84C" opacity="0.04"/>

  <!-- corner brackets, top-left -->
  <g stroke="#C9A84C" stroke-width="1" fill="none">
    <path d="M 80 80 L 80 110 M 80 80 L 110 80"/>
    <path d="M 1200 80 L 1200 110 M 1200 80 L 1170 80"/>
    <path d="M 80 560 L 80 530 M 80 560 L 110 560"/>
    <path d="M 1200 560 L 1200 530 M 1200 560 L 1170 560"/>
  </g>

  <!-- eyebrow -->
  <g transform="translate(140, 200)">
    <line x1="0" y1="0" x2="44" y2="0" stroke="#C9A84C" stroke-width="1"/>
    <text x="60" y="4" font-family="'SF Mono', 'Menlo', 'Consolas', monospace" font-size="14" letter-spacing="4" fill="#C9A84C">SOFTWARE STUDIO</text>
  </g>

  <!-- wordmark -->
  <g transform="translate(140, 360)">
    <text font-family="Georgia, 'Times New Roman', serif" font-size="148" fill="#F0EBE1" letter-spacing="-3">
      Binary <tspan font-style="italic" fill="#C9A84C">Tech</tspan>
    </text>
  </g>

  <!-- tagline -->
  <g transform="translate(140, 430)">
    <text font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="rgba(240,235,225,0.68)" letter-spacing="0.2">
      We build software from Libya to the world.
    </text>
  </g>

  <!-- meta footer row -->
  <g transform="translate(140, 540)">
    <text font-family="'SF Mono', 'Menlo', 'Consolas', monospace" font-size="13" letter-spacing="3" fill="rgba(240,235,225,0.42)">
      BINARY.LY  ·  LIBYA  ·  EST. 2024
    </text>
  </g>

  <!-- B mark right -->
  <g transform="translate(920, 160) scale(0.34)">
    <path fill="#F0EBE1" opacity="0.96" d="M924.32,622.42l-156.86.13,156.86-162.88v-163.68l-161.51-161.56h-444.1v159.3l-163.03-159.2v163.41l157.9,161.41h-157.9s0,162.97,0,162.97l158.06,160.1-158.06.69v162.47h607.53l161.12-162.27v-160.88ZM318.71,298.42h442.08v160.92h-442.08v-160.92ZM760.79,780.45l-442.08,1.94-.02-159.97h442.1v158.03Z"/>
  </g>
</svg>
