<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="Binary — Software Studio">
  <defs>
    <clipPath id="revL1"><rect x="80" y="226" width="0" height="28"><animate attributeName="width" values="0;0;540;540;0;0" keyTimes="0;0.005;0.06;0.22;0.245;1" dur="24s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="revL2"><rect x="80" y="226" width="0" height="28"><animate attributeName="width" values="0;0;410;410;0;0" keyTimes="0;0.255;0.31;0.47;0.495;1" dur="24s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="revL3"><rect x="80" y="226" width="0" height="28"><animate attributeName="width" values="0;0;330;330;0;0" keyTimes="0;0.505;0.555;0.72;0.745;1" dur="24s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="revL4"><rect x="80" y="226" width="0" height="28"><animate attributeName="width" values="0;0;380;380;0;0" keyTimes="0;0.755;0.81;0.97;0.995;1" dur="24s" repeatCount="indefinite"/></rect></clipPath>
  </defs>

  <rect width="1280" height="360" fill="#F0EBE1"/>

  <circle cx="1100" cy="80" r="220" fill="#7A5F1E" opacity="0.06"/>

  <g transform="translate(80, 70)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#7A5F1E" stroke-width="1"/>
    <text x="56" y="4" font-family="'SF Mono', 'Menlo', 'Consolas', monospace" font-size="11" letter-spacing="3.5" fill="#7A5F1E">SOFTWARE STUDIO</text>
  </g>

  <g transform="translate(80, 200)">
    <text font-family="Georgia, 'Times New Roman', serif" font-size="96" fill="#080808" letter-spacing="-2">
      Binary <tspan font-style="italic" fill="#7A5F1E">Tech</tspan>
    </text>
  </g>

  <g font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="rgba(8,8,8,0.72)" font-style="italic">
    <g opacity="0"><animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.005;0.22;0.245;1" dur="24s" repeatCount="indefinite"/>
      <text x="80" y="245" clip-path="url(#revL1)">Transforming ideas into powerful digital solutions.</text>
      <rect x="618" y="228" width="2" height="22" fill="#7A5F1E"><animate attributeName="fill-opacity" values="1;0;1" keyTimes="0;0.5;1" dur="0.7s" repeatCount="indefinite"/></rect>
    </g>
    <g opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.255;0.47;0.495;1" dur="24s" repeatCount="indefinite"/>
      <text x="80" y="245" clip-path="url(#revL2)">Precision over speed. Open by default.</text>
      <rect x="488" y="228" width="2" height="22" fill="#7A5F1E"><animate attributeName="fill-opacity" values="1;0;1" keyTimes="0;0.5;1" dur="0.7s" repeatCount="indefinite"/></rect>
    </g>
    <g opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.50;0.505;0.72;0.745;1" dur="24s" repeatCount="indefinite"/>
      <text x="80" y="245" clip-path="url(#revL3)">Built in Libya. Shipped to MENA.</text>
      <rect x="408" y="228" width="2" height="22" fill="#7A5F1E"><animate attributeName="fill-opacity" values="1;0;1" keyTimes="0;0.5;1" dur="0.7s" repeatCount="indefinite"/></rect>
    </g>
    <g opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.75;0.755;0.97;0.995;1" dur="24s" repeatCount="indefinite"/>
      <text x="80" y="245" clip-path="url(#revL4)">We craft instruments, not just code.</text>
      <rect x="458" y="228" width="2" height="22" fill="#7A5F1E"><animate attributeName="fill-opacity" values="1;0;1" keyTimes="0;0.5;1" dur="0.7s" repeatCount="indefinite"/></rect>
    </g>
  </g>

  <g transform="translate(80, 310)">
    <text font-family="'SF Mono', 'Menlo', 'Consolas', monospace" font-size="10" letter-spacing="2.5" fill="rgba(8,8,8,0.42)">
      LIBYA  ·  BUILT FOR MENA  ·  BINARY.LY
    </text>
  </g>

  <g transform="translate(960, 50) scale(0.24)">
    <path
      d="M 762.5,134.44 h -444.5 v 159.3 l -163.03,-159.2 v 163.41 l 157.9,161.41 L 318,458 v -160 h 442 v 160 h -442 L 313,458 h -157.9 v 162.97 l 158.06,160.1 L 318,781 v -160 h 442 v 160 h -442 L 313,781 l -158.06,0.69 v 162.47 h 607.53 l 161.12,-162.27 v -160 h -160 l 160,-160 v -160 L 762.5,134.44 Z"
      fill="none"
