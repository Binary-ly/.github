      pathLength="100"
      stroke-dasharray="100"
      stroke-dashoffset="100">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="2.4s" begin="0.3s" fill="freeze"/>
      <animate attributeName="stroke-opacity" from="1" to="0" begin="2.6s" dur="0.6s" fill="freeze"/>
    </path>
    <path
      d="M924.32,622.42l-156.86.13,156.86-162.88v-163.68l-161.51-161.56h-444.1v159.3l-163.03-159.2v163.41l157.9,161.41h-157.9s0,162.97,0,162.97l158.06,160.1-158.06.69v162.47h607.53l161.12-162.27v-160.88ZM318.71,298.42h442.08v160.92h-442.08v-160.92ZM760.79,780.45l-442.08,1.94-.02-159.97h442.1v158.03Z"
      fill="#080808"
      fill-opacity="0">
      <animate attributeName="fill-opacity" from="0" to="1" begin="2.4s" dur="0.7s" fill="freeze"/>
    </path>
  </g>

  <line x1="0" y1="359" x2="1280" y2="359" stroke="#7A5F1E" stroke-width="0.5" opacity="0.4"/>
</svg>
