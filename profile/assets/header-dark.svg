<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="Binary — Software Studio">
  <defs>
    <clipPath id="rev1"><rect x="80" y="226" width="0" height="28"><animate attributeName="width" values="0;0;510;510;0;0" keyTimes="0;0.005;0.06;0.215;0.22;1" dur="24s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="rev2"><rect x="80" y="226" width="0" height="28"><animate attributeName="width" values="0;0;395;395;0;0" keyTimes="0;0.255;0.31;0.465;0.47;1" dur="24s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="rev3"><rect x="80" y="226" width="0" height="28"><animate attributeName="width" values="0;0;325;325;0;0" keyTimes="0;0.505;0.555;0.715;0.72;1" dur="24s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="rev4"><rect x="80" y="226" width="0" height="28"><animate attributeName="width" values="0;0;365;365;0;0" keyTimes="0;0.755;0.81;0.965;0.97;1" dur="24s" repeatCount="indefinite"/></rect></clipPath>
  </defs>

  <rect width="1280" height="360" fill="#080808"/>

  <circle cx="1100" cy="80" r="220" fill="#C9A84C" opacity="0.05"/>

  <g transform="translate(80, 70)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#C9A84C" stroke-width="1"/>
    <text x="56" y="4" font-family="'SF Mono', 'Menlo', 'Consolas', monospace" font-size="11" letter-spacing="3.5" fill="#C9A84C">SOFTWARE STUDIO</text>
  </g>

  <g transform="translate(80, 200)">
    <text font-family="Georgia, 'Times New Roman', serif" font-size="96" fill="#F0EBE1" letter-spacing="-2">
      Binary <tspan font-style="italic" fill="#C9A84C">Tech</tspan>
    </text>
  </g>

  <!-- ROTATING TAGLINE — 4 lines, 24s loop, typewriter reveal -->
  <g font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="rgba(240,235,225,0.78)" font-style="italic">
    <g opacity="1"><animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.005;0.215;0.22;1" dur="24s" repeatCount="indefinite"/>
      <text x="80" y="245" clip-path="url(#rev1)">Transforming ideas into powerful digital solutions.</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.255;0.26;0.465;0.47;1" dur="24s" repeatCount="indefinite"/>
      <text x="80" y="245" clip-path="url(#rev2)">Precision over speed. Open by default.</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.505;0.51;0.715;0.72;1" dur="24s" repeatCount="indefinite"/>
      <text x="80" y="245" clip-path="url(#rev3)">Built in Libya. Shipped to MENA.</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.755;0.76;0.965;0.97;1" dur="24s" repeatCount="indefinite"/>
      <text x="80" y="245" clip-path="url(#rev4)">We craft instruments, not just code.</text>
    </g>
  </g>

<g transform="translate(80, 310)">
    <text font-family="'SF Mono', 'Menlo', 'Consolas', monospace" font-size="10" letter-spacing="2.5" fill="rgba(240,235,225,0.32)">
      LIBYA  ·  BUILT FOR MENA  ·  BINARY.LY
    </text>
  </g>

  <!-- B-mark — stroke draws in, then fill snaps on. Defaults are "visible" so static fallback still shows the mark. -->
  <g transform="translate(960, 50) scale(0.24)">
    <path
      d="M 762.5,134.44 h -444.5 v 159.3 l -163.03,-159.2 v 163.41 l 157.9,161.41 L 318,458 v -160 h 442 v 160 h -442 L 313,458 h -157.9 v 162.97 l 158.06,160.1 L 318,781 v -160 h 442 v 160 h -442 L 313,781 l -158.06,0.69 v 162.47 h 607.53 l 161.12,-162.27 v -160 h -160 l 160,-160 v -160 L 762.5,134.44 Z"
      fill="none"
      stroke="#F0EBE1"
      stroke-width="8"
      pathLength="100"
      stroke-dasharray="100"
      stroke-dashoffset="0">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="2.4s" begin="0.3s" fill="freeze"/>
      <animate attributeName="stroke-opacity" from="1" to="0" begin="2.6s" dur="0.6s" fill="freeze"/>
    </path>
    <path
      d="M924.32,622.42l-156.86.13,156.86-162.88v-163.68l-161.51-161.56h-444.1v159.3l-163.03-159.2v163.41l157.9,161.41h-157.9s0,162.97,0,162.97l158.06,160.1-158.06.69v162.47h607.53l161.12-162.27v-160.88ZM318.71,298.42h442.08v160.92h-442.08v-160.92ZM760.79,780.45l-442.08,1.94-.02-159.97h442.1v158.03Z"
      fill="#F0EBE1"
      fill-opacity="1">
      <animate attributeName="fill-opacity" from="0" to="1" begin="2.4s" dur="0.7s" fill="freeze"/>
    </path>
  </g>

  <line x1="0" y1="359" x2="1280" y2="359" stroke="#C9A84C" stroke-width="0.5" opacity="0.4"/>
</svg>
